<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LVA-NÖ Quiz Anmeldung</title>

<style>

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f2f4f7;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}


.container {

    background: white;
    width: 90%;
    max-width: 600px;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);

}


h1 {

    text-align: center;
    color: #003366;

}


.subtitle {

    text-align: center;
    font-size: 18px;
    line-height: 1.5;
    margin-bottom: 30px;

}


label {

    display: block;
    margin-top: 15px;
    font-weight: bold;

}


input, select {

    width: 100%;
    padding: 12px;
    margin-top: 5px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;

}


.checkbox {

    margin-top: 25px;
    font-weight: normal;

}


button {

    margin-top: 30px;
    width: 100%;
    padding: 15px;
    font-size: 18px;

    background: #005baa;
    color: white;

    border: none;
    border-radius: 8px;

    cursor: pointer;

}


button:hover {

    background:#004080;

}


.version {

    text-align:center;
    margin-top:25px;
    font-size:12px;
    color:#777;

}


</style>

</head>


<body>


<div class="container">


<h1>LVA-NÖ Quiz</h1>


<div class="subtitle">

Willkommen zum Quiz der<br>
<strong>Landesverkehrsabteilung Niederösterreich.</strong>

<br><br>

Bitte gib deine Daten ein und starte anschließend das Quiz.

</div>



<label>
Vorname
</label>

<input type="text" id="vorname" placeholder="Vorname">



<label>
Nachname
</label>

<input type="text" id="nachname" placeholder="Nachname">



<label>
Dienststelle
</label>


<select id="dienststelle">

<option value="">Bitte auswählen</option>

<option>API Alland</option>
<option>API Altlengbach</option>
<option>API Amstetten</option>
<option>API Großkrut FGP</option>
<option>API Krems</option>
<option>API Melk</option>
<option>API Schwechat FGP</option>
<option>API Stockerau FGP</option>
<option>API Tribuswinkel FGP</option>
<option>API Warth</option>

<option>LVA NÖ</option>
<option>LVA NÖ (VB)</option>

<option>LVA FB 1.1</option>
<option>LVA FB 1.2</option>

<option>LVA FB 2.1</option>
<option>LVA FB 2.1 (VB)</option>
<option>LVA FB 2.2</option>
<option>LVA FB 2.3</option>
<option>LVA FB 2.4</option>

<option>PI St. Pölten FGP</option>


</select>



<label class="checkbox">

<input type="checkbox" id="einmal">

Ich bestätige, dass ich nur einmal am Quiz teilnehme.

</label>



<button onclick="startQuiz()">

Quiz starten

</button>



<div class="version">

Version 0.3 – Teilnehmerverwaltung

</div>


</div>



<script>


function startQuiz() {


let vorname =
document.getElementById("vorname").value;


let nachname =
document.getElementById("nachname").value;


let dienststelle =
document.getElementById("dienststelle").value;


let bestaetigung =
document.getElementById("einmal").checked;



if(vorname==="" || nachname==="" || dienststelle==="") {

alert("Bitte alle Daten ausfüllen.");

return;

}



if(!bestaetigung) {

alert("Bitte bestätige die einmalige Teilnahme.");

return;

}



alert("Vielen Dank " + vorname + "! Das Quiz startet.");


// später:
// Daten speichern
// Zeit starten
// quiz.html öffnen


}


</script>


</body>

</html>
