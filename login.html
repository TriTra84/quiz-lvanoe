<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LVA-NÖ Quiz Anmeldung</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container">


<h1>LVA-NÖ Quiz</h1>


<div class="subtitle">

Willkommen zum Quiz der<br>
<strong>Landesverkehrsabteilung Niederösterreich.</strong>

<br><br>

Bitte gib deine Daten ein und starte anschließend das Quiz.

</div>



<label>
Vorname
</label>

<input type="text" id="vorname" placeholder="Vorname">



<label>
Nachname
</label>

<input type="text" id="nachname" placeholder="Nachname">



<label>
Dienststelle
</label>


<select id="dienststelle">

<option value="">Bitte auswählen</option>

<option>API Alland</option>
<option>API Altlengbach</option>
<option>API Amstetten</option>
<option>API Großkrut FGP</option>
<option>API Krems</option>
<option>API Melk</option>
<option>API Schwechat FGP</option>
<option>API Stockerau FGP</option>
<option>API Tribuswinkel FGP</option>
<option>API Warth</option>

<option>LVA NÖ</option>
<option>LVA NÖ (VB)</option>

<option>LVA FB 1.1</option>
<option>LVA FB 1.2</option>

<option>LVA FB 2.1</option>
<option>LVA FB 2.1 (VB)</option>
<option>LVA FB 2.2</option>
<option>LVA FB 2.3</option>
<option>LVA FB 2.4</option>

<option>PI St. Pölten FGP</option>


</select>



<label class="checkbox">

<input type="checkbox" id="einmal">

Ich bestätige, dass ich nur einmal am Quiz teilnehme.

</label>



<button onclick="startQuiz()">

Quiz starten

</button>



<div class="version">

Version 1.3 – Teilnehmerverwaltung

</div>


</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>



<script>


async function startQuiz() {


let vorname =
document.getElementById("vorname").value;


let nachname =
document.getElementById("nachname").value;


let dienststelle =
document.getElementById("dienststelle").value;


let bestaetigung =
document.getElementById("einmal").checked;



if(vorname==="" || nachname==="" || dienststelle==="") {

alert("Bitte alle Daten ausfüllen.");

return;

}



if(!bestaetigung) {

alert("Bitte bestätige die einmalige Teilnahme.");

return;

}



let name = vorname + " " + nachname;



const { data, error } = await supabaseClient

.from("Teilnehmer")

.insert([

{

name: name,

dienststelle: dienststelle,

startzeit: new Date()

}

]);



if(error) {


console.log(error);

alert("Fehler beim Speichern.");

return;


}



alert("Vielen Dank " + vorname + "! Das Quiz startet.");



window.location.href = "quiz.html";


}


</script>



</body>

</html>
